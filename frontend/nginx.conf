# frontend/nginx.conf
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
 
    # for any URL that doesn't match a file,
    # serve index.html 
    location / {
        try_files $uri $uri/ /index.html;
    }
 
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control 'public, immutable';
    }
}

