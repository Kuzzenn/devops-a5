name: 'Docker CI/CD — Deploy to Testing'
 
on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:
 
jobs:
  docker-ci-cd-testing:
    name: 'Build > Test > Lint > Docker Push > Deploy > Notify'
    runs-on: ubuntu-latest
 
    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v4
 
      - name: 'Setup Node.js 20'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
 
      - name: 'Build — Install & Verify Backend'
        working-directory: ./backend
        run: |
          npm ci
          node -e "require('./server'); process.exit(0);"
        env:
          NODE_ENV: test
 
 
      - name: 'Unit Tests'
        working-directory: ./backend
        run: npm test
        env:
          NODE_ENV: test
        
      - name: 'Code Analysis — ESLint'
        working-directory: ./backend
        run: npm run lint
        
 
      - name: 'Configure AWS Credentials'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}
 
      
      - name: 'Login to Amazon ECR'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
       
 
     
      - name: 'Build & Push Backend Docker Image'
        run: |
          # Define image tags
          IMAGE_URI=${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}
          SHA_TAG=${IMAGE_URI}:backend-${{ github.sha }}
          LATEST_TAG=${IMAGE_URI}:backend-latest
 
          # Build: -t tags the image, -f specifies Dockerfile
          docker build -t $SHA_TAG -t $LATEST_TAG ./backend
 
          # Push both tags to ECR
          docker push $SHA_TAG
          docker push $LATEST_TAG
 
          echo "Backend image: $SHA_TAG"
     
 
      
      - name: 'Build & Push Frontend Docker Image'
        run: |
          IMAGE_URI=${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}
          SHA_TAG=${IMAGE_URI}:frontend-${{ github.sha }}
          LATEST_TAG=${IMAGE_URI}:frontend-latest
 
          # Pass the backend URL as a build argument 
          docker build \
            --build-arg REACT_APP_API_URL=http://${{ secrets.TESTING_SERVER_IP }}:5000 \
            -t $SHA_TAG \
            -t $LATEST_TAG \
            ./frontend
 
          docker push $SHA_TAG
          docker push $LATEST_TAG
          echo "Frontend image: $SHA_TAG"
 
      
      
      - name: 'Deploy to AWS Testing Server (Docker)'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host:     ${{ secrets.TESTING_SERVER_IP }}
          username: ubuntu
          key:      ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_REGION,ECR_REGISTRY,ECR_REPOSITORY,GITHUB_SHA
          script: |
            set -e
 
            # 1. Login Docker to ECR
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
              | docker login --username AWS \
              --password-stdin ${{ secrets.ECR_REGISTRY }}
 
            # 2. Pull latest images from ECR
            BACKEND_IMAGE=${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:backend-latest
            FRONTEND_IMAGE=${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:frontend-latest
 
            docker pull $BACKEND_IMAGE
            docker pull $FRONTEND_IMAGE
 
            # 3. Get docker-compose.prod.yml from repo
            if [ ! -d ~/app ]; then
              git clone https://github.com/${{ github.repository }}.git ~/app
            fi
            cd ~/app && git fetch origin && git pull
 
            # 4. Run compose with pulled images
            export BACKEND_IMAGE=$BACKEND_IMAGE
            export FRONTEND_IMAGE=$FRONTEND_IMAGE
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d
 
            # 5. Show running containers in logs
            docker compose -f docker-compose.prod.yml ps
 
            # 6. Quick health check
            sleep 5
            curl -sf http://localhost:5000/health && echo 'Backend healthy'
 
      
      - name: 'Notify QA — Docker Deployment Successful'
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port:    587
          secure:         false
          username:       ${{ secrets.EMAIL_USER }}
          password:       ${{ secrets.EMAIL_PASS }}
          to:             ${{ secrets.QA_EMAIL }}
          from:           'DevOps Pipeline <${{ secrets.EMAIL_USER }}>'
          subject:        '[Testing/Docker] PR #${{ github.event.pull_request.number }} Deployed'
          body: |
            Dear QA Team,
 
            A Dockerized feature has been deployed to the Testing environment.
 
            ── Pull Request Details ──────────────────
            Title:   ${{ github.event.pull_request.title }}
            Author:  ${{ github.actor }}
            Branch:  ${{ github.head_ref }}
            PR Link: ${{ github.event.pull_request.html_url }}
 
            ── Docker Image Tags ─────────────────────
            Backend:  backend-${{ github.sha }}
            Frontend: frontend-${{ github.sha }}
 
            ── Access the Deployed Application ──────
            Frontend:    http://${{ secrets.TESTING_SERVER_IP }}
            Backend API: http://${{ secrets.TESTING_SERVER_IP }}:5000
            Health:      http://${{ secrets.TESTING_SERVER_IP }}:5000/health
 
            All checks passed: build   tests   lint   deploy 
 
            Regards,
            Automated CI/CD Pipeline — DevOps CS316
 
      
      - name: 'Notify — Pipeline Failed'
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port:    587
          secure:         false
          username:       ${{ secrets.EMAIL_USER }}
          password:       ${{ secrets.EMAIL_PASS }}
          to:             '${{ secrets.INSTRUCTOR_EMAIL }}, ${{ secrets.DEVELOPER_EMAIL }}'
          from:           'DevOps Pipeline <${{ secrets.EMAIL_USER }}>'
          subject:        '[Docker Pipeline FAILED] PR #${{ github.event.pull_request.number }}'
          body: |
            The Docker CI/CD pipeline has FAILED.
            PR: ${{ github.event.pull_request.title }}
            Author: ${{ github.actor }}
            Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

