name: 'Docker CI/CD — Deploy to Staging'
 
on:
  push:
    branches: [ main ]
  workflow_dispatch:
 
jobs:
  docker-ci-cd-staging:
    name: 'Build > Test > Lint > Docker Push > Staging Deploy > Notify'
    runs-on: ubuntu-latest
 
    steps:
 
      - name: 'Checkout Repository'
        uses: actions/checkout@v4
 
      - name: 'Setup Node.js 20'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
 
      - name: 'Build — Install & Verify Backend'
        working-directory: ./backend
        run: |
          npm ci
          node -e "require('./server'); process.exit(0);"
        env:
          NODE_ENV: test
 
      - name: 'Unit Tests (Jest)'
        working-directory: ./backend
        run: npm test
        env:
          NODE_ENV: test
 
      - name: 'Code Analysis — ESLint'
        working-directory: ./backend
        run: npm run lint
 
      - name: 'Configure AWS Credentials'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}
 
      - name: 'Login to Amazon ECR'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
 
      - name: 'Build & Push Backend Image'
        run: |
          IMAGE_URI=${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}
          docker build -t ${IMAGE_URI}:backend-${{ github.sha }} \
                       -t ${IMAGE_URI}:backend-latest ./backend
          docker push ${IMAGE_URI}:backend-${{ github.sha }}
          docker push ${IMAGE_URI}:backend-latest
 
      - name: 'Build & Push Frontend Image'
        run: |
          IMAGE_URI=${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}
          docker build \
            --build-arg REACT_APP_API_URL=http://${{ secrets.STAGING_SERVER_IP }}:5000 \
            -t ${IMAGE_URI}:frontend-${{ github.sha }} \
            -t ${IMAGE_URI}:frontend-latest \
            ./frontend
          docker push ${IMAGE_URI}:frontend-${{ github.sha }}
          docker push ${IMAGE_URI}:frontend-latest
 
      - name: 'Deploy to AWS Staging Server (Docker)'
        uses: appleboy/ssh-action@v1.0.0
        with:
          host:     ${{ secrets.STAGING_SERVER_IP }}
          username: ubuntu
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
 
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
              | docker login --username AWS \
              --password-stdin ${{ secrets.ECR_REGISTRY }}
 
            BACKEND_IMAGE=${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:backend-latest
            FRONTEND_IMAGE=${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:frontend-latest
 
            docker pull $BACKEND_IMAGE
            docker pull $FRONTEND_IMAGE
 
            if [ ! -d ~/app ]; then
              git clone https://github.com/${{ github.repository }}.git ~/app
            fi
            cd ~/app && git fetch origin && git checkout main && git pull
 
            export BACKEND_IMAGE=$BACKEND_IMAGE
            export FRONTEND_IMAGE=$FRONTEND_IMAGE
            docker compose -f docker-compose.prod.yml down
            docker compose -f docker-compose.prod.yml up -d
            docker compose -f docker-compose.prod.yml ps
 
            sleep 5
            curl -sf http://localhost:5000/health && echo 'Backend healthy'
 
      - name: 'Notify Team — Staging Updated'
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port:    587
          secure:         false
          username:       ${{ secrets.EMAIL_USER }}
          password:       ${{ secrets.EMAIL_PASS }}
          to:             ${{ secrets.QA_EMAIL }}
          from:           'DevOps Pipeline <${{ secrets.EMAIL_USER }}>'
          subject:        '[Staging/Docker] Updated — ${{ github.sha }}'
          body: |
            Staging has been updated with Dockerized application.
 
            Commit:   ${{ github.sha }}
            Author:   ${{ github.actor }}
            Message:  ${{ github.event.head_commit.message }}
 
            Frontend:    http://${{ secrets.STAGING_SERVER_IP }}
            Backend API: http://${{ secrets.STAGING_SERVER_IP }}:5000
 
            DevOps Pipeline — DevOps CS316
 
      - name: 'Notify — Staging Failed'
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port:    587
          secure:         false
          username:       ${{ secrets.EMAIL_USER }}
          password:       ${{ secrets.EMAIL_PASS }}
          to:             '${{ secrets.INSTRUCTOR_EMAIL }}, ${{ secrets.DEVELOPER_EMAIL }}'
          from:           'DevOps Pipeline <${{ secrets.EMAIL_USER }}>'
          subject:        '[Staging/Docker FAILED] ${{ github.sha }}'
          body: |
            Staging Docker deployment failed.
            Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

