services:
 
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    restart: always
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
 
  backend:
    image: ${BACKEND_IMAGE}
    container_name: backend
    restart: always
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/students
      - PORT=5000
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - app-network
 
  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: frontend
    restart: always
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - app-network
 
volumes:
  mongo_data:
 
networks:
  app-network:
    

